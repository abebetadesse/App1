<body>
    <div id="root">

            <div style="padding: 20px; text-align: center;">

            <div style="text-align: center;">
                <div style="width: 50px; height: 50px; border: 3px solid rgba(255, 255, 255, 0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
                <h2>Loading Tham Platform...</h2>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
    
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
