<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tham AI Platform – Professional Matching</title>
    <meta name="description" content="AI-powered professional matching with Moodle integration" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#646cff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- removed preload for vite.svg to avoid warning -->
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
      .app-loading { position:fixed; top:0; left:0; width:100%; height:100%; background:#f8f9fa; display:flex; justify-content:center; align-items:center; z-index:9999; }
      .spinner { width:48px; height:48px; border:4px solid #e9ecef; border-top-color:#646cff; border-radius:50%; animation:spin 1s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div class="app-loading"><div class="spinner"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
